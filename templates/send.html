<!DOCTYPE html>
<html>
<head>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <title>Compose Email</title>
</head>
<body class="p-5 bg-light">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow p-4">
            <h3 class="mb-4">Compose Audit Email</h3>
            
            <!-- This exact action matches your app.py backend route -->
            <form method="POST" action="/send-email">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">To:</label>
                    <input type="email" name="recipient" class="form-control" required placeholder="recipient@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Subject:</label>
                    <input type="text" name="subject" class="form-control" required placeholder="Enter Subject">
                </div>
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Message Layout:</label>
                    <textarea name="body" class="form-control" rows="4" required placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Send & Log Metadata</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/dashboard" class="text-secondary small">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
